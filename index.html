<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kugna FM</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
<style>
  :root{
    --bg:#0d0f14; --panel:#161a23; --panel-2:#1e2430;
    --text:#e8ecf2; --muted:#8a93a6; --accent:#4ade80; --accent-2:#22c55e;
    --border:#242b38;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--bg)}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #1b2130 0%, var(--bg) 60%) no-repeat;
    background-color:var(--bg);
    color:var(--text); min-height:100vh; display:flex; justify-content:center;
    padding:calc(32px + env(safe-area-inset-top)) 16px 200px;
  }
  .app{width:100%; max-width:520px}
  header{margin-bottom:22px}
  h1{font-size:32px; font-weight:750; letter-spacing:-.03em}
  .ep-sentinel{height:1px}

  /* Category filter pills */
  .pills{
    display:flex; gap:8px; overflow-x:auto; margin-bottom:16px; padding-bottom:4px;
    scrollbar-width:none; -webkit-overflow-scrolling:touch;
  }
  .pills::-webkit-scrollbar{display:none}
  .pill{
    flex:none; padding:7px 15px; border-radius:999px; border:1px solid var(--border);
    background:var(--panel); color:var(--muted); font:inherit; font-size:13px; font-weight:600;
    cursor:pointer; white-space:nowrap; transition:.15s;
  }
  .pill:hover:not(.active){color:var(--text)}
  .pill.active{background:var(--accent); color:#06210f; border-color:var(--accent)}

  .stations{display:flex; flex-direction:column; gap:10px}
  .station{
    display:flex; align-items:center; gap:14px; padding:14px 16px;
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    cursor:pointer; transition:.15s border-color,.15s background,.15s transform;
    text-align:left; color:var(--text); font:inherit;
  }
  .station:hover{background:var(--panel-2); border-color:#33405a}
  .station:active{transform:scale(.99)}
  .station.active{border-color:var(--accent); background:var(--panel-2)}
  .thumb{
    width:46px; height:46px; border-radius:12px; flex:none; position:relative; overflow:hidden;
    display:grid; place-items:center; font-size:16px; font-weight:700;
    background:linear-gradient(135deg,#2a3242,#1a1f2b); color:var(--accent);
  }
  .thumb img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; background:#0d0f14}
  .station.active .thumb{background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#06210f}
  .station.unavailable{opacity:.5}
  .station.unavailable .desc{color:#6b5a5a}
  .meta{flex:1; min-width:0}
  .name{font-size:15px; font-weight:600; color:#ffffff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .tag{
    display:inline-block; vertical-align:middle; margin-left:6px;
    font-size:10px; font-weight:700; letter-spacing:.03em; line-height:1;
    padding:3px 6px; border-radius:6px;
    background:rgba(96,165,250,.16); color:#93c5fd; border:1px solid rgba(96,165,250,.4);
  }
  .desc{font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .kebab{
    flex:none; width:32px; height:32px; border-radius:8px; border:none; background:transparent;
    color:var(--muted); cursor:pointer; display:grid; place-items:center; transition:.15s;
  }
  .kebab:hover{background:var(--panel-2); color:var(--text)}
  /* Bottom sheet */
  .sheet-backdrop{
    position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.5);
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; transition:opacity .2s;
  }
  .sheet-backdrop.show{opacity:1}
  .sheet{
    width:100%; max-width:520px; max-height:80vh; display:flex; flex-direction:column; gap:5px;
    background:var(--panel); border-top:1px solid var(--border); border-radius:20px 20px 0 0;
    padding:8px 12px calc(16px + env(safe-area-inset-bottom));
    transform:translateY(100%); transition:transform .26s cubic-bezier(.32,.72,0,1);
  }
  .sheet-backdrop.show .sheet{transform:translateY(0)}
  .sheet-handle{width:40px; height:4px; border-radius:2px; background:var(--border); margin:6px auto 8px}
  .sheet-head{padding:2px 8px 12px; text-align:center}
  .sheet-title{font-size:16px; font-weight:650}
  .sheet-sub{font-size:13px; color:var(--muted); margin-top:3px}
  .sheet-item{
    width:100%; text-align:left; padding:15px 16px; border:none; border-radius:12px; background:var(--panel-2);
    color:var(--text); font:inherit; font-size:15px; font-weight:500; cursor:pointer; transition:.12s;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .sheet-item:hover{background:#252c3a}
  .sheet-item.current{color:var(--accent)}
  .sheet-item.current::after{content:' ✓'}
  .sheet-item.create{color:var(--accent)}
  .sheet-item.danger{color:#f87171}
  .sheet-input{
    width:100%; padding:13px 14px; border-radius:12px; border:1px solid var(--border);
    background:var(--bg); color:var(--text); font:inherit; font-size:15px; outline:none; margin-bottom:5px;
  }
  .sheet-input:focus{border-color:var(--accent)}
  .sheet-list{overflow-y:auto; display:flex; flex-direction:column; gap:5px}
  .sheet-cancel{
    width:100%; text-align:center; padding:15px; border:none; border-radius:12px; margin-top:6px;
    background:var(--panel-2); color:var(--text); font:inherit; font-size:15px; font-weight:650; cursor:pointer;
  }
  .sheet-cancel:hover{background:#252c3a}
  .bars{display:flex; align-items:flex-end; gap:2px; height:18px; width:18px; flex:none; opacity:0}
  .station.active .bars{opacity:1}
  .bars span{width:3px; background:var(--accent); border-radius:2px; height:30%}
  .playing .bars span{animation:eq .9s ease-in-out infinite}
  .bars span:nth-child(2){animation-delay:.2s} .bars span:nth-child(3){animation-delay:.4s}
  @keyframes eq{0%,100%{height:25%}50%{height:100%}}

  /* Player bar */
  .dock{position:fixed; left:0; right:0; bottom:0; z-index:50}
  .player{
    background:rgba(18,22,30,.85); backdrop-filter:blur(16px);
    border-top:1px solid var(--border); padding:12px 16px;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .bottomnav{
    display:flex; background:rgba(13,15,20,.92); backdrop-filter:blur(16px);
    border-top:1px solid var(--border);
    padding:8px 8px calc(8px + env(safe-area-inset-bottom));
  }
  .navitem{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; color:var(--muted); font:inherit; font-size:11px; font-weight:600;
    cursor:pointer; padding:5px 4px; border-radius:10px; transition:.15s;
  }
  .navitem.active{color:var(--accent)}
  .navitem:hover:not(.active){color:var(--text)}
  .navitem svg{width:23px; height:23px}
  .player-inner{width:100%; max-width:520px; display:flex; align-items:center; gap:14px}
  .seek{width:100%; max-width:520px; display:flex; align-items:center; gap:10px}
  .seek[hidden]{display:none}
  .seek .t{font-size:11px; color:var(--muted); width:40px; text-align:center; flex:none; font-variant-numeric:tabular-nums}
  .seek input[type=range]{flex:1}
  .np-cover{
    width:40px; height:40px; border-radius:9px; flex:none; background:#242b38;
    background-size:cover; background-position:center; display:none;
  }
  .np-cover.show{display:block}
  .np{flex:1; min-width:0}
  .np .name{font-size:14px}
  .np .status{font-size:12px; color:var(--muted)}
  .np .status.live{color:var(--accent)}
  .play-btn{
    width:52px; height:52px; border-radius:50%; border:none; flex:none;
    background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#06210f;
    font-size:20px; cursor:pointer; display:grid; place-items:center;
    transition:.15s transform; box-shadow:0 6px 20px rgba(74,222,128,.25);
  }
  .play-btn:hover{transform:scale(1.06)} .play-btn:active{transform:scale(.96)}
  .play-btn:disabled{opacity:.4; cursor:default; transform:none; box-shadow:none}
  .skip-btn{
    width:38px; height:38px; border-radius:50%; border:none; flex:none;
    background:transparent; color:var(--muted); cursor:pointer;
    display:grid; place-items:center; transition:.15s;
  }
  .skip-btn:hover{background:var(--panel-2); color:var(--text)}
  .skip-btn:active{transform:scale(.92)}
  .vol{display:flex; align-items:center; gap:8px; width:110px}
  .vol svg{flex:none; color:var(--muted)}
  input[type=range]{
    -webkit-appearance:none; width:100%; height:4px; border-radius:4px;
    background:var(--border); outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:var(--text); cursor:pointer;
  }
  @media (max-width:440px){.vol{display:none}}

  /* Tabs */
  .tabs{display:flex; gap:6px; margin-bottom:20px; background:var(--panel); padding:4px; border-radius:12px; border:1px solid var(--border)}
  .tab{flex:1; padding:9px; border:none; border-radius:9px; background:transparent; color:var(--muted); font:inherit; font-size:14px; font-weight:600; cursor:pointer; transition:.15s}
  .tab.active{background:var(--panel-2); color:#fff}
  .tab:hover:not(.active){color:var(--text)}

  /* Podcast list */
  #podcastList{display:flex; flex-direction:column; gap:10px}
  #podcastList[hidden]{display:none}
  .podcard{
    display:flex; align-items:center; gap:14px; padding:14px 16px; width:100%;
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    cursor:pointer; transition:.15s border-color,.15s background,.15s transform;
    text-align:left; color:var(--text); font:inherit;
  }
  .podcard:hover{background:var(--panel-2); border-color:#33405a}
  .podcard:active{transform:scale(.99)}
  .podcard .chev{color:var(--muted); font-size:24px; line-height:1; flex:none}
  .podback{
    display:inline-flex; align-items:center; gap:6px; margin-bottom:18px;
    background:none; border:none; color:var(--muted); font:inherit; font-size:14px; font-weight:600;
    cursor:pointer; padding:2px 0;
  }
  .podback:hover{color:var(--text)}

  /* Podcast detail */
  .pod-head{display:flex; gap:16px; align-items:center; margin-bottom:22px}
  .pod-head img{width:88px; height:88px; border-radius:16px; flex:none; object-fit:cover; background:var(--panel)}
  .pod-head .pt{font-size:18px; font-weight:650; letter-spacing:-.01em}
  .pod-head .pd{font-size:12.5px; color:var(--muted); margin-top:5px; line-height:1.4;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden}
  .episodes{display:flex; flex-direction:column; gap:10px}
  .episode{
    display:flex; align-items:center; gap:14px; padding:14px 16px;
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    cursor:pointer; transition:.15s border-color,.15s background,.15s transform;
    text-align:left; color:var(--text); font:inherit;
  }
  .episode:hover{background:var(--panel-2); border-color:#33405a}
  .episode:active{transform:scale(.99)}
  .episode.active{border-color:var(--accent); background:var(--panel-2)}
  .episode.active .thumb{background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#06210f}
  .ep-meta{flex:1; min-width:0}
  .ep-title{font-size:14.5px; font-weight:600; color:#fff; line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .ep-sub{font-size:12px; color:var(--muted); margin-top:4px}
  .episode.played{opacity:.5}
  .ep-new{
    display:inline-block; font-size:10px; font-weight:700; letter-spacing:.03em; line-height:1;
    padding:2px 6px; border-radius:5px; margin-right:7px; vertical-align:1px;
    background:rgba(74,222,128,.16); color:var(--accent);
  }
  .ep-fav{flex:none; color:var(--accent); display:grid; place-items:center}
  .ep-fav svg{width:15px; height:15px}
  .pod-msg{padding:28px 16px; text-align:center; color:var(--muted); font-size:14px; line-height:1.5}
  .pod-msg button{margin-top:12px; padding:8px 16px; border:1px solid var(--border); border-radius:9px;
    background:var(--panel-2); color:var(--text); font:inherit; font-size:13px; cursor:pointer}
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1 id="sectionTitle">Radios</h1>
    </header>

    <div id="radioView">
      <div class="pills" id="pills"></div>
      <div class="stations" id="stations"></div>
    </div>

    <div id="podcastView" hidden>
      <div id="podcastList"></div>
      <div id="podcastDetail" hidden>
        <button class="podback" id="podBack" type="button">‹ Podcasts</button>
        <div class="pod-head" id="podHead"></div>
        <div class="episodes" id="episodes"></div>
      </div>
    </div>
  </div>

  <div class="dock">
  <div class="player" id="player">
    <div class="seek" id="seek" hidden>
      <span class="t" id="curTime">0:00</span>
      <input type="range" id="seekBar" min="0" max="1000" value="0" aria-label="Seek">
      <span class="t" id="durTime">0:00</span>
    </div>
    <div class="player-inner">
      <button class="play-btn" id="playBtn" disabled>▶</button>
      <div class="np-cover" id="npCover"></div>
      <div class="np">
        <div class="name" id="npName">Pick a station</div>
        <div class="status" id="npStatus">Nothing playing</div>
      </div>
      <div class="vol">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/></svg>
        <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">
      </div>
    </div>
  </div>
  <nav class="bottomnav">
    <button class="navitem active" id="navRadio" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1.8" fill="currentColor" stroke="none"/><path d="M8.1 8.1a5.5 5.5 0 000 7.8M15.9 8.1a5.5 5.5 0 010 7.8M5.3 5.3a9.5 9.5 0 000 13.4M18.7 5.3a9.5 9.5 0 010 13.4"/></svg>
      <span>Radios</span>
    </button>
    <button class="navitem" id="navPodcasts" type="button">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 006 6.92V21h2v-3.08A7 7 0 0019 11h-2z"/></svg>
      <span>Podcasts</span>
    </button>
  </nav>
  </div>

  <audio id="audio"></audio>

<script>
const STATIONS = [
  { id:"radio24", name:"Radio 24", desc:"News & talk — Il Sole 24 Ore", emoji:"24",
    url:"https://ilsole24ore-radio.akamaized.net/hls/live/2035301/radio24/playlist-64000.m3u8", type:"hls",
    img:"https://cdn-profiles.tunein.com/s26090/images/logoq.png" },
  { id:"deejay", name:"Radio Deejay", desc:"Deejay 4 Italy", emoji:"DJ",
    url:"https://4c4b867c89244861ac216426883d1ad0.msvdn.net/radiodeejay/radiodeejay/master_ma.m3u8", type:"hls",
    img:"https://cdn-profiles.tunein.com/s1216/images/logoq.png" },
  { id:"smoothjazz247", name:"Smooth Jazz 24/7", desc:"Smooth jazz around the clock", emoji:"SJ",
    url:"https://jking.cdnstream1.com/b75154_128mp3", type:"native",
    img:"https://cdn-profiles.tunein.com/s297918/images/logoq.jpg" },
  { id:"smoothjazzfl", name:"Smooth Jazz Florida", desc:"Smooth jazz from Florida", emoji:"FL",
    url:"https://server.webnetradio.net/proxy/wsjf?mp=/1", type:"native",
    img:"https://cdn-radiotime-logos.tunein.com/s206902q.png" },
  { id:"smoothjazzpl", name:"SmoothJazz.com.pl", desc:"The European home of smooth jazz", emoji:"PL",
    url:"https://bcast.vigormultimedia.com:48888/sjcompl320mp3", type:"native",
    img:"https://cdn-profiles.tunein.com/s106565/images/logoq.jpg" },
  { id:"bluemarlin", name:"Blue Marlin Ibiza Radio", desc:"The Blue Marlin Ibiza experience 24/7", emoji:"BM",
    url:"https://stream.radiojar.com/u7gk5agata3vv", type:"native",
    img:"https://cdn-profiles.tunein.com/s140897/images/logoq.jpg" },
  { id:"nts1", name:"NTS Radio 1", desc:"Live radio from the world's best DJs", emoji:"N1",
    url:"https://stream-relay-geo.ntslive.net/stream", type:"native",
    img:"https://cdn-profiles.tunein.com/s150238/images/logoq.jpg" },
  { id:"nts2", name:"NTS Radio 2", desc:"Live radio from the world's best DJs", emoji:"N2",
    url:"https://stream-relay-geo.ntslive.net/stream2", type:"native",
    img:"https://cdn-profiles.tunein.com/s286827/images/logoq.jpg" },
  { id:"ntspoolside", name:"NTS Poolside", desc:"Balearic, boogie & sophisti-pop", emoji:"NP",
    url:"https://stream-mixtape-geo.ntslive.net/mixtape4", type:"native",
    img:"https://cdn-profiles.tunein.com/s309373/images/logoq.jpg" },
  { id:"ibizasonica", name:"Ibiza Sonica Radio", desc:"Cultura de radio — 92.4 Ibiza", emoji:"IS",
    url:"https://ibizasonica.streaming-pro.com:8000/ibizasonica", type:"native",
    img:"https://cdn-radiotime-logos.tunein.com/s78109q.png" },
  { id:"somaagent", name:"SomaFM: Secret Agent", desc:"Soundtrack for your mysterious life", emoji:"SA",
    url:"https://ice1.somafm.com/secretagent-128-mp3", type:"native",
    img:"https://cdn-profiles.tunein.com/s2593/images/logoq.jpg" },
  { id:"somagroove", name:"SomaFM: Groove Salad", desc:"Ambient / downtempo beats & grooves", emoji:"GS",
    url:"https://ice1.somafm.com/groovesalad-128-mp3", type:"native",
    img:"https://cdn-profiles.tunein.com/s2591/images/logoq.png" },
  { id:"lifegate", name:"LifeGate Radio", desc:"Lombardy — 105.3 FM", emoji:"LG",
    url:"https://router.xdevel.com/audio0s975809-345/stream/icecast.audio", type:"native",
    img:"https://cdn-profiles.tunein.com/s8868/images/logoq.jpg" },
  { id:"smoothgrooving", name:"Smooth Grooving FM", desc:"Soft Soul, Smooth Jazz 24/7 from London", emoji:"SG",
    url:"https://sgr.lucasmultimedia.com/stream.mp3", type:"native", tag:"UK Only",
    img:"https://cdn-radiotime-logos.tunein.com/s137889q.png" },
];

const audio = document.getElementById('audio');
const stationsEl = document.getElementById('stations');
const playBtn = document.getElementById('playBtn');
const npName = document.getElementById('npName');
const npStatus = document.getElementById('npStatus');
const npCover = document.getElementById('npCover');
const volEl = document.getElementById('vol');

function setNpCover(st){
  if (st && st.img){
    npCover.style.backgroundImage = `url("${st.img}")`;
    npCover.classList.add('show');
  } else {
    npCover.classList.remove('show');
  }
}

let current = null;   // station object (radio mode)
let loaded = false;   // whether current's stream is actually loaded into <audio>
let hls = null;
let mode = 'radio';   // 'radio' | 'podcast'
let episodes = [];    // parsed podcast episodes
let currentEp = null; // currently playing episode (podcast mode)

const seekEl = document.getElementById('seek');
const seekBar = document.getElementById('seekBar');
const curTimeEl = document.getElementById('curTime');
const durTimeEl = document.getElementById('durTime');

/* ---------- Categories ---------- */
// Default category per station; the user can override any via the chip (saved).
const DEFAULT_CATS = {
  radio24:'Italian', deejay:'Italian', lifegate:'Italian',
  smoothjazz247:'Smooth Jazz', smoothjazzfl:'Smooth Jazz', smoothjazzpl:'Smooth Jazz', smoothgrooving:'Smooth Jazz',
  bluemarlin:'Ibiza', ibizasonica:'Ibiza',
  nts1:'Eclectic', nts2:'Eclectic', ntspoolside:'Eclectic',
  somaagent:'Eclectic', somagroove:'Eclectic',
};
const catOverrides = JSON.parse(localStorage.getItem('kugna.cats') || '{}');
const deletedIds = new Set(JSON.parse(localStorage.getItem('kugna.deleted') || '[]'));
let activeCat = 'All';
const pillsEl = document.getElementById('pills');

function catOf(st){ return catOverrides[st.id] || DEFAULT_CATS[st.id] || 'Uncategorized'; }
function liveStations(){ return STATIONS.filter(st => !deletedIds.has(st.id)); }
function allCategories(){
  const out = [];
  liveStations().forEach(st => { const c = catOf(st); if (!out.includes(c)) out.push(c); });
  return out;
}
function visibleStations(){ return liveStations().filter(st => activeCat === 'All' || catOf(st) === activeCat); }

function renderPills(){
  if (activeCat !== 'All' && !allCategories().includes(activeCat)) activeCat = 'All';
  pillsEl.innerHTML = '';
  ['All', ...allCategories()].forEach(c => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'pill' + (c === activeCat ? ' active' : '');
    b.textContent = c;
    b.addEventListener('click', () => { activeCat = c; renderPills(); buildStations(); });
    pillsEl.appendChild(b);
  });
}

/* ---------- Bottom sheets ---------- */
let currentSheet = null;
function closeSheet(){
  if (!currentSheet) return;
  const s = currentSheet; currentSheet = null;
  s.classList.remove('show');
  document.removeEventListener('keydown', s._onKey);
  setTimeout(() => s.remove(), 240);
}
function openSheet(build){
  closeSheet();
  const backdrop = document.createElement('div');
  backdrop.className = 'sheet-backdrop';
  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  backdrop.appendChild(sheet);
  document.body.appendChild(backdrop);
  build(sheet, closeSheet);
  requestAnimationFrame(() => backdrop.classList.add('show'));
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeSheet(); });
  backdrop._onKey = e => { if (e.key === 'Escape') closeSheet(); };
  document.addEventListener('keydown', backdrop._onKey);
  currentSheet = backdrop;
}

function loadStream(st){
  // tear down previous hls instance
  if (hls){ hls.destroy(); hls = null; }
  if (st.type === 'hls'){
    if (window.Hls && Hls.isSupported()){
      hls = new Hls();
      // Register handlers BEFORE attachMedia — MEDIA_ATTACHED can fire during
      // attach, and if the listener isn't set yet loadSource never runs and the
      // stream stalls. Start playback only after the manifest is parsed.
      hls.on(Hls.Events.MEDIA_ATTACHED, () => hls.loadSource(st.url));
      hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(()=>{}));
      hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) setStatus('Stream unavailable'); });
      hls.attachMedia(audio);
    } else {
      // Safari plays HLS natively
      audio.src = st.url;
      audio.play().catch(()=>{});
    }
  } else {
    audio.src = st.url;
    audio.play().catch(()=>{});
  }
}

function selectStation(st){
  mode = 'radio';
  currentEp = null;
  seekEl.hidden = true;
  if (st.type === 'unavailable'){
    current = st;
    npName.textContent = st.name;
    setNpCover(st);
    setStatus('Geo-restricted — unavailable');
    playBtn.disabled = true;
    audio.pause();
    refreshActive();
    return;
  }
  if (loaded && current && current.id === st.id){
    // same station AND already loaded → toggle play/pause
    if (audio.paused) audio.play(); else audio.pause();
    return;
  }
  current = st;
  npName.textContent = st.name;
  setNpCover(st);
  setStatus('Connecting…');
  loadStream(st);  // starts playback itself, at the right moment per stream type
  loaded = true;
  playBtn.disabled = false;
  refreshActive();
  localStorage.setItem('radio.last', st.id);
}

playBtn.addEventListener('click', () => {

});

// Skip to prev/next item (wraps around). Episodes in podcast mode, stations otherwise.
function skip(dir){
  if (mode === 'podcast'){
    if (!episodes.length) return;
    let idx = currentEp ? episodes.findIndex(e => e.guid === currentEp.guid) : (dir > 0 ? -1 : 0);
    idx = (idx + dir + episodes.length) % episodes.length;
    playEpisode(episodes[idx]);
    return;
  }
  const list = visibleStations();
  const n = list.length;
  if (!n) return;
  let idx = current ? list.findIndex(s => s.id === current.id) : (dir > 0 ? -1 : 0);
  if (idx === -1) idx = (dir > 0 ? -1 : 0);
  for (let i = 0; i < n; i++){
    idx = (idx + dir + n) % n;
    if (list[idx].type !== 'unavailable'){ selectStation(list[idx]); return; }
  }
}

function fmtTime(sec){ if(!isFinite(sec)||sec<0) return '0:00'; const m=Math.floor(sec/60), s=Math.floor(sec%60); return m+':'+String(s).padStart(2,'0'); }

// Podcasts you follow. Add more entries here to follow additional shows.
const PODCASTS = [
  { id:'funkshop', title:'The Funk Shop', author:'a cura di Bassi Maestro — RSI Rete Tre',
    feed:'https://www.rsi.ch/rete-tre/programmi/intrattenimento/the-funk-shop/?f=podcast-xml',
    img:'https://cleaver.cue.rsi.ch/public/rete-tre/programmi/intrattenimento/the-funk-shop/2027713-33hue1-audio_16x9-rete_tre_the_funk_shop.png/alternates/r1x1_3000/2027713-33hue1-audio_16x9-rete_tre_the_funk_shop.png' },
];
// Static hosting can't read the feeds directly (no CORS), so route through a
// CORS proxy. Try each in order until one returns valid RSS.
const PROXIES = [
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
];
const podcastListEl = document.getElementById('podcastList');
const podcastDetailEl = document.getElementById('podcastDetail');
const podHead = document.getElementById('podHead');
const episodesEl = document.getElementById('episodes');
let currentPod = null;

function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function stripHtml(html){ const d = document.createElement('div'); d.innerHTML = html || ''; return (d.textContent || '').trim(); }
function fmtDate(s){ const d = new Date(s); return isNaN(d) ? '' : d.toLocaleDateString(undefined, {day:'numeric', month:'short', year:'numeric'}); }
function fmtDur(s){
  if (!s) return '';
  const p = s.split(':').map(Number);
  let sec = p.length === 3 ? p[0]*3600+p[1]*60+p[2] : p.length === 2 ? p[0]*60+p[1] : Number(s);
  if (!sec || isNaN(sec)) return '';
  return Math.round(sec/60) + ' min';
}

async function fetchFeed(url){
  let lastErr;
  for (const p of PROXIES){
    try {
      const r = await fetch(p(url));
      if (!r.ok){ lastErr = new Error('HTTP ' + r.status); continue; }
      const txt = await r.text();
      if (txt && txt.includes('<rss')) return txt;
      lastErr = new Error('no rss in response');
    } catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('feed unreachable');
}

function parseFeed(xmlText){
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  if (doc.querySelector('parsererror')) throw new Error('parse error');
  const chan = doc.querySelector('channel');
  if (!chan) throw new Error('no channel');
  const txt = (el, sel) => { const n = el && el.querySelector(sel); return n ? n.textContent.trim() : ''; };
  const nsHref = (el, tag) => { const n = el.getElementsByTagName(tag)[0]; return n ? (n.getAttribute('href') || '') : ''; };

  const podTitle = txt(chan, 'title');
  const podImg = nsHref(chan, 'itunes:image') || txt(chan, 'image > url');
  const podDesc = stripHtml(txt(chan, 'description'));

  const items = [...doc.querySelectorAll('item')].map(it => {
    const enc = it.querySelector('enclosure');
    const audioUrl = enc ? enc.getAttribute('url') : '';
    const durNode = it.getElementsByTagName('itunes:duration')[0];
    return {
      guid: txt(it, 'guid') || audioUrl,
      title: txt(it, 'title'),
      audio: audioUrl,
      img: nsHref(it, 'itunes:image') || podImg,
      date: fmtDate(txt(it, 'pubDate')),
      duration: fmtDur(durNode ? durNode.textContent.trim() : ''),
    };
  }).filter(e => e.audio);

  return { podTitle, podImg, podDesc, items };
}

/* ---------- Episode state: played / bookmarked / resume / new ---------- */
const playedEps = new Set(JSON.parse(localStorage.getItem('kugna.played') || '[]'));
const favEps    = new Set(JSON.parse(localStorage.getItem('kugna.fav') || '[]'));
const resumePos = JSON.parse(localStorage.getItem('kugna.pos') || '{}');   // guid -> seconds
const seenEps   = new Set(JSON.parse(localStorage.getItem('kugna.seen') || '[]'));
const seenAtStart = new Set(seenEps);   // snapshot → "New since last visit"

const savePlayed = () => localStorage.setItem('kugna.played', JSON.stringify([...playedEps]));
const saveFav    = () => localStorage.setItem('kugna.fav', JSON.stringify([...favEps]));
const saveResume = () => localStorage.setItem('kugna.pos', JSON.stringify(resumePos));
function markSeen(items){ items.forEach(ep => seenEps.add(ep.guid)); localStorage.setItem('kugna.seen', JSON.stringify([...seenEps])); }
// New = appeared since your last visit (skip on the very first visit, when
// nothing has been seen yet, to avoid flagging the whole back catalogue).
function isNew(ep){ return seenAtStart.size > 0 && !seenAtStart.has(ep.guid) && !playedEps.has(ep.guid); }
function findEpisodeEl(guid){ return [...episodesEl.querySelectorAll('.episode')].find(e => e.dataset.guid === guid); }
function refreshEpisodeRow(ep){ const el = findEpisodeEl(ep.guid); if (el) el.replaceWith(makeEpisodeEl(ep)); refreshActive(); }

function togglePlayed(ep){
  if (playedEps.has(ep.guid)) playedEps.delete(ep.guid);
  else { playedEps.add(ep.guid); delete resumePos[ep.guid]; saveResume(); }
  savePlayed(); refreshEpisodeRow(ep);
}
function toggleFav(ep){
  if (favEps.has(ep.guid)) favEps.delete(ep.guid); else favEps.add(ep.guid);
  saveFav(); refreshEpisodeRow(ep);
}

const BOOKMARK_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h12a1 1 0 011 1v16l-7-4-7 4V5a1 1 0 011-1z"/></svg>';
const DOTS_SVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>';

// Episodes render lazily: a first batch (latest episodes) on open, then more
// as the sentinel scrolls into view. Keeps a 100-item feed snappy.
const EP_BATCH = 15;
let epRendered = 0;
let epObserver = null;
const epSentinel = document.createElement('div');
epSentinel.className = 'ep-sentinel';

function makeEpisodeEl(ep){
  const el = document.createElement('div');
  el.className = 'episode';
  el.dataset.guid = ep.guid;
  el.setAttribute('role', 'button');
  el.tabIndex = 0;
  if (playedEps.has(ep.guid)) el.classList.add('played');
  const sub = [ep.date, ep.duration].filter(Boolean).join(' · ');
  el.innerHTML = `
    <div class="thumb"><span>♪</span>${ep.img ? `<img src="${esc(ep.img)}" alt="" loading="lazy" onerror="this.remove()">` : ''}</div>
    <div class="ep-meta">
      <div class="ep-title">${esc(ep.title)}</div>
      <div class="ep-sub">${isNew(ep) ? '<span class="ep-new">New</span>' : ''}${esc(sub)}</div>
    </div>
    ${favEps.has(ep.guid) ? `<span class="ep-fav">${BOOKMARK_SVG}</span>` : ''}
    <div class="bars"><span></span><span></span><span></span></div>
    <button class="kebab" type="button" aria-label="Options">${DOTS_SVG}</button>`;
  el.addEventListener('click', e => { if (e.target.closest('.kebab')) return; playEpisode(ep); });
  el.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ' ') && !e.target.closest('.kebab')){ e.preventDefault(); playEpisode(ep); }
  });
  el.querySelector('.kebab').addEventListener('click', e => { e.stopPropagation(); episodeSheet(ep); });
  return el;
}

// Per-episode action sheet (⋯)
function episodeSheet(ep){
  openSheet((sheet, close) => {
    const played = playedEps.has(ep.guid);
    const fav = favEps.has(ep.guid);
    const hasResume = (resumePos[ep.guid] || 0) > 5 && !played;
    sheet.innerHTML = `
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div class="sheet-title">${esc(ep.title)}</div>
        <div class="sheet-sub">${esc([ep.date, ep.duration].filter(Boolean).join(' · '))}</div>
      </div>
      ${hasResume ? `<button class="sheet-item" data-a="resume">Resume at ${fmtTime(resumePos[ep.guid])}</button><button class="sheet-item" data-a="restart">Play from beginning</button>` : ''}
      <button class="sheet-item" data-a="played">${played ? 'Mark as unplayed' : 'Mark as played'}</button>
      <button class="sheet-item" data-a="fav">${fav ? 'Remove bookmark' : 'Bookmark'}</button>
      <button class="sheet-cancel" data-a="cancel">Cancel</button>`;
    const on = (a, fn) => { const b = sheet.querySelector(`[data-a="${a}"]`); if (b) b.onclick = fn; };
    on('resume', () => { playEpisode(ep); close(); });
    on('restart', () => { delete resumePos[ep.guid]; saveResume(); playEpisode(ep); close(); });
    on('played', () => { togglePlayed(ep); close(); });
    on('fav', () => { toggleFav(ep); close(); });
    on('cancel', close);
  });
}

function renderMoreEpisodes(){
  const next = episodes.slice(epRendered, epRendered + EP_BATCH);
  const frag = document.createDocumentFragment();
  next.forEach(ep => frag.appendChild(makeEpisodeEl(ep)));
  episodesEl.insertBefore(frag, epSentinel);
  epRendered += next.length;
  refreshActive();
  if (epRendered >= episodes.length){
    if (epObserver) epObserver.disconnect();
    epSentinel.hidden = true;
  }
}

function renderPodcast(data){
  episodes = data.items;
  podHead.innerHTML = `
    ${data.podImg ? `<img src="${esc(data.podImg)}" alt="" onerror="this.style.visibility='hidden'">` : ''}
    <div>
      <div class="pt">${esc(data.podTitle)}</div>
      <div class="pd">${esc(data.podDesc)}</div>
    </div>`;
  episodesEl.innerHTML = '';
  epRendered = 0;
  epSentinel.hidden = false;
  episodesEl.appendChild(epSentinel);
  if (epObserver) epObserver.disconnect();
  epObserver = new IntersectionObserver(
    ents => { if (ents.some(e => e.isIntersecting)) renderMoreEpisodes(); },
    { rootMargin: '600px 0px' }
  );
  epObserver.observe(epSentinel);
  renderMoreEpisodes();  // first batch = latest episodes
  markSeen(data.items);  // so these aren't flagged "New" on the next visit
}

async function loadPodcast(pod, force){
  currentPod = pod;
  const cacheKey = 'kugna.feed.' + pod.id;
  // Show cached feed instantly, then refresh live from the network (auto-update).
  const cached = localStorage.getItem(cacheKey);
  let rendered = false;
  if (cached){ try { renderPodcast(JSON.parse(cached)); rendered = true; } catch(e){} }
  if (!rendered) episodesEl.innerHTML = '<div class="pod-msg">Loading episodes…</div>';
  try {
    const data = parseFeed(await fetchFeed(pod.feed));
    localStorage.setItem(cacheKey, JSON.stringify(data));
    renderPodcast(data);
  } catch(e){
    if (!rendered){
      episodesEl.innerHTML = '<div class="pod-msg">Couldn’t load episodes right now.<br><button type="button" id="retryPod">Try again</button></div>';
      const rb = document.getElementById('retryPod');
      if (rb) rb.addEventListener('click', () => loadPodcast(pod, true));
    }
  }
}

function playEpisode(ep){
  if (mode === 'podcast' && currentEp && currentEp.guid === ep.guid){
    if (audio.paused) audio.play(); else audio.pause();
    return;
  }
  // Save the outgoing episode's position before switching.
  saveCurrentPos();
  mode = 'podcast';
  currentEp = ep;
  if (hls){ hls.destroy(); hls = null; }
  npName.textContent = ep.title;
  if (ep.img){ npCover.style.backgroundImage = `url("${ep.img}")`; npCover.classList.add('show'); }
  else npCover.classList.remove('show');
  setStatus('Connecting…');
  seekEl.hidden = false;
  seekBar.value = 0; curTimeEl.textContent = '0:00'; durTimeEl.textContent = '0:00';
  playBtn.disabled = false;
  audio.src = ep.audio;
  // Resume where we left off, if any.
  const resume = resumePos[ep.guid] || 0;
  if (resume > 5){
    const seek = () => { try { audio.currentTime = resume; } catch(e){} };
    audio.addEventListener('loadedmetadata', seek, { once: true });
  }
  audio.play().catch(()=>{});
  refreshActive();
}

// Persist the current episode's playback position (skip if finished/near end).
function saveCurrentPos(){
  if (mode !== 'podcast' || !currentEp) return;
  const t = audio.currentTime, d = audio.duration || 0;
  if (t > 5 && (!d || t < d - 10) && !playedEps.has(currentEp.guid)){
    resumePos[currentEp.guid] = t; saveResume();
  }
}

/* ---------- Bottom nav (sections) ---------- */
const sectionTitle = document.getElementById('sectionTitle');
const navRadio = document.getElementById('navRadio');
const navPodcasts = document.getElementById('navPodcasts');
function showSection(sec){
  const isPod = sec === 'podcasts';
  document.getElementById('radioView').hidden = isPod;
  document.getElementById('podcastView').hidden = !isPod;
  navRadio.classList.toggle('active', !isPod);
  navPodcasts.classList.toggle('active', isPod);
  sectionTitle.textContent = isPod ? 'Podcasts' : 'Radios';
  localStorage.setItem('kugna.tab', sec);
  if (isPod){ renderPodcastList(); showPodcastList(); }
}
navRadio.addEventListener('click', () => showSection('radio'));
navPodcasts.addEventListener('click', () => showSection('podcasts'));

if (localStorage.getItem('kugna.tab') === 'podcasts') showSection('podcasts');
</script>
